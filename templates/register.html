<!DOCTYPE html>   
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Naija-CIPE Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
      body {
        background: #faf6ec;
        font-family: Arial, sans-serif;
      }
  
      .register-card {
        max-width: 415px;
        background: #fff;
        border-radius: 18px;
        padding: 42px 36px;
      }
  
      .brand-icon {
        width: 36px;
        height: 36px;
        border: 3px solid #f2a900;
        border-radius: 50%;
        margin: 0 auto 18px;
        position: relative;
      }
  
      .brand-icon::after {
        content: "";
        width: 14px;
        height: 14px;
        background: #d99a13;
        border-radius: 50%;
        position: absolute;
        top: 8px;
        left: 8px;
      }
  
      h1 {
        font-family: Georgia, serif;
        color: #123d2b;
        font-weight: 700;
        font-size: 30px;
      }
  
      .form-control {
        height: 43px;
        border-radius: 8px;
      }
  
      .btn-success {
        background-color: #0f7a52;
        border: none;
        border-radius: 7px;
        font-weight: 600;
      }
  
      .btn-success:hover {
        background-color: #0b6845;
      }
  
      .divider {
        display: flex;
        align-items: center;
        color: #777;
        font-size: 14px;
        margin: 18px 0;
      }
  
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #eee;
      }
  
      .divider span {
        padding: 0 10px;
      }
  
      a {
        color: #006b4a;
        font-weight: 500;
      }
    </style>
  </head>
  
  <body>
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
      <div class="register-card shadow-sm w-100">
  
        <div class="brand-icon"></div>
  
        <div class="text-center mb-4">
          <h1>Create your account</h1>
          <p class="text-muted mb-0">Join NaijaCipe and start collecting recipes.</p>
        </div>
  
        <button class="btn btn-outline-secondary w-100 mb-2">
          <span class="fw-bold text-primary">G</span>
          <span class="ms-2 fw-semibold">Sign up with Google</span>
        </button>
  
        <div class="divider">
          <span>or sign up with email</span>
        </div>
  
        <form>
          <div class="mb-3">
            <label for="fullName" class="form-label fw-semibold">Full name</label>
            <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Adaeze Okoro">
          </div>
  
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="adaeze_cooks">
            <small class="text-muted">3–20 characters, letters and numbers only</small>
          </div>
  
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com">
          </div>
  
          <div class="row mb-3">
            <div class="col">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="••••••••">
            </div>
            <div class="col">
              <label for="confirmPassword" class="form-label fw-semibold">Confirm password</label>
              <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="••••••••">
            </div>
          </div>
  
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="terms">
            <label class="form-check-label" for="terms">
              I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </label>
          </div>
  
          <button type="submit" class="btn btn-success w-100 py-2">
            Create Account
          </button>
        </form>
  
        <p class="text-center mt-4 mb-0">
          Already have an account? <a href="#" class="text-decoration-none">Log in</a>
        </p>
  
      </div>
    </div>
  </body>
  </html>
