<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Naija-CIPE Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      background: #f8f3e9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 414px;
      background: #fff;
      border-radius: 18px;
      padding: 44px 36px 36px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.04);
    }

    .user-icon {
      width: 36px;
      height: 36px;
      border: 3px solid #0f7b58;
      border-radius: 50%;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f7b58;
      font-size: 22px;
    }

    h1 {
      font-family: Georgia, serif;
      font-weight: 700;
      color: #173526;
      font-size: 32px;
    }

    .form-control {
      height: 43px;
      border-radius: 7px;
      border-color: #ddd7cf;
    }

    .form-control:focus {
      border-color: #0f7b58;
      box-shadow: 0 0 0 0.15rem rgba(15, 123, 88, 0.15);
    }

    .btn-login {
      background: #137c58;
      border: none;
      height: 36px;
      border-radius: 7px;
      font-weight: 700;
    }

    .btn-login:hover {
      background: #0f6b4c;
    }

    .small-link {
      color: #0f7b58;
      font-weight: 600;
      font-size: 13px;
    }

    .divider {
      display: flex;
      align-items: center;
      color: #777;
      font-size: 14px;
      margin: 18px 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .divider span {
      padding: 0 12px;
    }

    .google-btn {
      height: 42px;
      border-radius: 7px;
      font-weight: 600;
      color: #444;
    }

    .google-logo {
      width: 18px;
      margin-right: 8px;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <div class="user-icon">
      👤
    </div>

    <div class="text-center mb-4">
      <h1 class="mb-1">Welcome back</h1>
      <p class="text-muted mb-0">Log in to your NaijaCipe account.</p>
    </div>

    <form>
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold small">Username or email</label>
        <input 
          type="text" 
          class="form-control" 
          id="email" 
          placeholder="adaeze_cooks or you@example.com"
        >
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <label for="password" class="form-label fw-semibold small">Password</label>
          <a href="#" class="small-link">Forgot password?</a>
        </div>
        <input 
          type="password" 
          class="form-control" 
          id="password" 
          placeholder="••••••••"
        >
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="remember">
        <label class="form-check-label small" for="remember">
          Remember me for 30 days
        </label>
      </div>

      <button type="submit" class="btn btn-login text-white w-100">
        Log in
      </button>
    </form>

    <div class="divider">
      <span>or continue with</span>
    </div>

    <button class="btn btn-outline-secondary google-btn w-100">
      <img 
        src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
        alt="Google logo" 
        class="google-logo"
      >
      Continue with Google
    </button>

    <p class="text-center small mt-3 mb-0">
      New to NaijaCipe?
      <a href="#" class="small-link text-decoration-none">Create account</a>
    </p>
  </div>

</body>
</html>
