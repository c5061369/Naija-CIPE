{% extends "base.html" %} {% block title %}Log In{% endblock %} {% block content
%}
<div class="auth-wrap">
  <div class="container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <i
          class="bi bi-person-circle"
          style="font-size: 2.5rem; color: var(--naija-green)"
        ></i>
        <h2 class="mt-2">Welcome back</h2>
        <p class="text-muted mb-0">Log in to your NaijaCipe account.</p>
      </div>

      <form
        method="POST"
        action="{{ url_for('login') }}"
        novalidate
        autocomplete="off"
      >
        <div class="mb-3">
          <label class="form-label" for="username">Username or email</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="adaeze_cooks or you@example.com"
            autocomplete="off"
            required
          />
        </div>

        <div class="mb-3">
          <label
            class="form-label d-flex justify-content-between"
            for="password"
          >
            Password
            <a href="#" style="font-size: 0.85rem; color: var(--naija-green)"
              >Forgot password?</a
            >
          </label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="off"
            required
          />
        </div>

        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="remember"
            name="remember"
          />
          <label
            class="form-check-label"
            for="remember"
            style="font-size: 0.88rem"
          >
            Remember me for 30 days
          </label>
        </div>

        <button type="submit" class="btn btn-naija w-100 py-2">Log in</button>
      </form>

      <div class="d-flex align-items-center my-3 gap-2">
        <hr class="flex-grow-1 m-0" />
        <span class="text-muted" style="font-size: 0.85rem; white-space: nowrap"
          >or continue with</span
        >
        <hr class="flex-grow-1 m-0" />
      </div>

      <a
        href="#"
        class="btn btn-outline-secondary w-100 py-2 d-flex align-items-center justify-content-center gap-2"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            fill="#4285F4"
            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
          />
          <path
            fill="#34A853"
            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
          />
          <path
            fill="#FBBC05"
            d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"
          />
          <path
            fill="#EA4335"
            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
          />
        </svg>
        <strong>Continue with Google</strong>
      </a>

      <p class="text-center mt-3 mb-0">
        <small>
          New to NaijaCipe?
          <a
            href="{{ url_for('register') }}"
            style="color: var(--naija-green); font-weight: 600"
            >Create account</a
          >
        </small>
      </p>
    </div>
  </div>
</div>

<script>
  /* Clear login form fields on page load */
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
  });
</script>
{% endblock %}
